<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logos Morpheme Tokenizer</title>
  <link rel="preconnect" href="https://api.fontshare.com">
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&f[]=zodiak@400,500&display=swap" rel="stylesheet">
  <style>
    :root, [data-theme="light"] {
      --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
      --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem; --space-4: 1rem; --space-5: 1.25rem; --space-6: 1.5rem; --space-8: 2rem; --space-10: 2.5rem; --space-12: 3rem; --space-16: 4rem;
      --color-bg: #f7f6f2; --color-surface: #f9f8f5; --color-surface-2: #fbfbf9; --color-surface-offset: #f3f0ec; --color-border: #d4d1ca; --color-divider: #dcd9d5;
      --color-text: #28251d; --color-text-muted: #7a7974; --color-text-faint: #bab9b4; --color-text-inverse: #f9f8f4;
      --color-primary: #01696f; --color-primary-hover: #0c4e54; --color-primary-highlight: #cedcd8;
      --color-success: #437a22; --color-warning: #964219; --color-error: #a12c7b; --color-blue: #006494; --color-purple: #7a39bb; --color-gold: #d19900;
      --radius-sm: 0.375rem; --radius-md: 0.5rem; --radius-lg: 0.75rem; --radius-xl: 1rem; --radius-full: 9999px;
      --shadow-sm: 0 1px 2px oklch(0.2 0.01 80 / 0.06); --shadow-md: 0 4px 12px oklch(0.2 0.01 80 / 0.08); --shadow-lg: 0 12px 32px oklch(0.2 0.01 80 / 0.12);
      --transition: 180ms cubic-bezier(0.16,1,0.3,1);
      --font-body: 'Satoshi', 'Inter', sans-serif;
      --font-display: 'Zodiak', Georgia, serif;
      --root: #01696f; --suffix: #006494; --ending: #437a22; --prefix: #964219; --bpe: #7a7974; --punct: #7a39bb; --num: #d19900; --special: #bab9b4;
    }
    [data-theme="dark"] {
      --color-bg: #171614; --color-surface: #1c1b19; --color-surface-2: #201f1d; --color-surface-offset: #1d1c1a; --color-border: #393836; --color-divider: #262523;
      --color-text: #cdccca; --color-text-muted: #979692; --color-text-faint: #5a5957; --color-text-inverse: #2b2a28;
      --color-primary: #4f98a3; --color-primary-hover: #227f8b; --color-primary-highlight: #313b3b;
      --color-success: #6daa45; --color-warning: #bb653b; --color-error: #d163a7; --color-blue: #5591c7; --color-purple: #a86fdf; --color-gold: #e8af34;
      --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.2); --shadow-md: 0 4px 12px oklch(0 0 0 / 0.3); --shadow-lg: 0 12px 32px oklch(0 0 0 / 0.4);
      --root: #4f98a3; --suffix: #7eb7e6; --ending: #8bcf68; --prefix: #db9268; --bpe: #979692; --punct: #c89bf0; --num: #f2c560; --special: #5a5957;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0; min-height: 100vh; font-family: var(--font-body); font-size: var(--text-base); line-height: 1.6;
      color: var(--color-text); background:
      radial-gradient(circle at top right, color-mix(in oklab, var(--color-primary) 12%, transparent), transparent 28%),
      radial-gradient(circle at bottom left, color-mix(in oklab, var(--color-blue) 8%, transparent), transparent 32%),
      var(--color-bg);
    }
    button, input, textarea { font: inherit; }
    .shell { max-width: 1200px; margin: 0 auto; padding: var(--space-6); }
    .header { display: flex; align-items: center; justify-content: space-between; gap: var(--space-4); margin-bottom: var(--space-8); }
    .brand { display: flex; align-items: center; gap: var(--space-3); }
    .logo { width: 40px; height: 40px; border-radius: 12px; display: grid; place-items: center; background: linear-gradient(135deg, var(--color-primary-highlight), color-mix(in oklab, var(--color-surface) 72%, var(--color-primary) 28%)); box-shadow: var(--shadow-sm); font-weight: 700; font-size: 1.2rem; color: var(--color-primary); }
    .brand h1 { font-family: var(--font-display); font-size: var(--text-xl); line-height: 1; margin: 0; }
    .brand p { margin: 0; color: var(--color-text-muted); font-size: var(--text-sm); }
    .theme-toggle { min-width: 44px; min-height: 44px; border-radius: var(--radius-full); border: 1px solid color-mix(in oklab, var(--color-text) 12%, transparent); background: var(--color-surface); color: var(--color-text); display: inline-grid; place-items: center; box-shadow: var(--shadow-sm); cursor: pointer; transition: transform var(--transition); }
    .theme-toggle:hover { transform: translateY(-1px); }
    .panel { background: color-mix(in oklab, var(--color-surface) 88%, transparent); border: 1px solid color-mix(in oklab, var(--color-text) 10%, transparent); border-radius: var(--radius-xl); box-shadow: var(--shadow-md); backdrop-filter: blur(14px); }
    .panel-inner { padding: var(--space-6); }
    .section-title { margin: 0 0 var(--space-4); font-size: var(--text-lg); }
    .input-wrap { display: grid; gap: var(--space-4); }
    label { font-size: var(--text-sm); font-weight: 700; }
    textarea {
      width: 100%; min-height: 160px; resize: vertical; padding: var(--space-4); border-radius: var(--radius-lg);
      border: 1px solid color-mix(in oklab, var(--color-text) 12%, transparent); background: var(--color-surface-2); color: var(--color-text);
      box-shadow: inset 0 1px 2px oklch(0 0 0 / 0.04); font-family: var(--font-body); font-size: var(--text-base); line-height: 1.6;
    }
    textarea:focus-visible { outline: 2px solid var(--color-primary); outline-offset: 3px; }
    textarea::placeholder { color: var(--color-text-faint); }
    .actions { display: flex; flex-wrap: wrap; gap: var(--space-3); }
    .btn { min-height: 44px; padding: 0 var(--space-5); border-radius: var(--radius-full); border: 1px solid transparent; font-size: var(--text-sm); font-weight: 700; display: inline-flex; align-items: center; justify-content: center; gap: var(--space-2); cursor: pointer; transition: transform var(--transition), background var(--transition), border-color var(--transition); }
    .btn:hover { transform: translateY(-1px); }
    .btn-primary { background: var(--color-primary); color: var(--color-text-inverse); box-shadow: var(--shadow-sm); }
    .btn-primary:hover { background: var(--color-primary-hover); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-secondary { background: var(--color-surface); color: var(--color-text); border-color: color-mix(in oklab, var(--color-text) 12%, transparent); }
    .btn-secondary:hover { border-color: var(--color-primary); }
    .btn-download { display: none; }
    .btn-download.visible { display: inline-flex; }

    /* Stats */
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: var(--space-3); margin-top: var(--space-5); }
    .stat { padding: var(--space-4); border-radius: var(--radius-lg); background: var(--color-surface-offset); border: 1px solid color-mix(in oklab, var(--color-text) 8%, transparent); }
    .stat span { display: block; font-size: var(--text-xs); color: var(--color-text-muted); text-transform: uppercase; letter-spacing: .08em; }
    .stat strong { display: block; font-size: var(--text-lg); }

    /* Legend */
    .legend { display: flex; flex-wrap: wrap; gap: var(--space-2); margin-bottom: var(--space-4); }
    .chip { display: inline-flex; align-items: center; gap: var(--space-2); padding: .45rem .75rem; border-radius: var(--radius-full); background: var(--color-surface-offset); border: 1px solid color-mix(in oklab, var(--color-text) 10%, transparent); font-size: var(--text-xs); }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: currentColor; }

    /* Token stream */
    .token-stream { display: flex; flex-wrap: wrap; gap: var(--space-2); align-items: flex-start; line-height: 2.2; }
    .token {
      border-radius: 999px; padding: .4rem .7rem; font-size: var(--text-sm); line-height: 1; border: 1px solid transparent;
      background: color-mix(in oklab, currentColor 14%, var(--color-surface)); color: var(--color-text); position: relative; cursor: default;
      transition: transform var(--transition);
    }
    .token:hover { transform: scale(1.06); z-index: 10; }
    .token::after {
      content: attr(data-meta); position: absolute; left: 50%; transform: translate(-50%, calc(100% + 10px)); bottom: -8px; white-space: nowrap;
      background: var(--color-text); color: var(--color-text-inverse); padding: .3rem .5rem; font-size: 12px; border-radius: var(--radius-sm); opacity: 0; pointer-events: none; transition: opacity var(--transition);
      box-shadow: var(--shadow-sm); font-family: 'SFMono-Regular', 'Consolas', monospace;
    }
    .token:hover::after { opacity: 1; }
    .t-ROOT { color: var(--root); }
    .t-SUF { color: var(--suffix); }
    .t-END { color: var(--ending); }
    .t-PRE { color: var(--prefix); }
    .t-BPE { color: var(--bpe); }
    .t-PUNCT { color: var(--punct); }
    .t-NUM { color: var(--num); }
    .t-SPECIAL { color: var(--special); }
    .t-space { width: 8px; background: transparent !important; border: 1px dashed color-mix(in oklab, var(--color-text) 12%, transparent) !important; color: transparent !important; padding: .4rem 2px; }

    /* POS/Type chips */
    .chips { display: flex; flex-wrap: wrap; gap: var(--space-2); }
    .stat-chip { padding: .35rem .7rem; border-radius: var(--radius-full); font-size: var(--text-xs); font-weight: 600; background: color-mix(in oklab, currentColor 12%, var(--color-surface)); }
    .stat-chip.pos { color: var(--color-primary); }

    /* Roundtrip */
    .roundtrip { font-family: 'SFMono-Regular', 'Consolas', monospace; font-size: var(--text-sm); line-height: 1.7; word-break: break-word; color: var(--color-text); }
    .rt-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 10px; border-radius: var(--radius-full); font-size: var(--text-xs); font-weight: 700; margin-left: var(--space-3); }
    .rt-badge.pass { background: color-mix(in oklab, var(--color-success) 15%, transparent); color: var(--color-success); }
    .rt-badge.fail { background: color-mix(in oklab, var(--color-error) 15%, transparent); color: var(--color-error); }

    /* Loading */
    .loading { display: none; color: var(--color-text-muted); font-size: var(--text-sm); align-items: center; gap: var(--space-2); }
    .loading.active { display: inline-flex; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { width: 16px; height: 16px; border: 2px solid var(--color-border); border-top-color: var(--color-primary); border-radius: 50%; animation: spin 0.6s linear infinite; }

    #results { display: none; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4); }
    .section-gap { margin-top: var(--space-6); }

    @media (max-width: 640px) {
      .shell { padding: var(--space-4); }
      .stats { grid-template-columns: 1fr 1fr; }
      .grid-2 { grid-template-columns: 1fr; }
      .panel-inner { padding: var(--space-4); }
      textarea { min-height: 140px; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition-duration: .01ms !important; animation-duration: .01ms !important; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="header">
      <div class="brand">
        <div class="logo">Λ</div>
        <div>
          <h1>Morpheme Tokenizer</h1>
          <p>Logos Engine · pymorphy3 + Tikhonov</p>
        </div>
      </div>
      <button class="theme-toggle" type="button" data-theme-toggle aria-label="Switch theme">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      </button>
    </header>

    <section class="panel">
      <div class="panel-inner">
        <div class="input-wrap">
          <label for="input">Исходный текст</label>
          <textarea id="input" placeholder="Введите текст для морфемного анализа...">Нейронные сети обучаются методом обратного распространения ошибки</textarea>
          <div class="actions">
            <button class="btn btn-primary" id="tokenizeBtn" type="button">Токенизировать</button>
            <button class="btn btn-secondary" id="clearBtn" type="button">Clear</button>
            <button class="btn btn-secondary btn-download" id="downloadBtn" type="button">⬇ JSON</button>
            <div class="loading" id="loading"><div class="spinner"></div> Анализ...</div>
          </div>
        </div>

        <div class="stats" id="statsPanel">
          <article class="stat"><span>Total tokens</span><strong id="statTokens">0</strong></article>
          <article class="stat"><span>Words</span><strong id="statWords">0</strong></article>
          <article class="stat"><span>Latin words</span><strong id="statLatin">0</strong></article>
          <article class="stat"><span>Roots</span><strong id="statRoots">0</strong></article>
          <article class="stat"><span>Vocab size</span><strong id="statVocab">0</strong></article>
        </div>
      </div>
    </section>

    <div id="results">
      <section class="panel section-gap">
        <div class="panel-inner">
          <h2 class="section-title">Морфемная разметка</h2>
          <div class="legend">
            <span class="chip" style="color:var(--root)"><span class="dot"></span>Корень</span>
            <span class="chip" style="color:var(--suffix)"><span class="dot"></span>Суффикс</span>
            <span class="chip" style="color:var(--ending)"><span class="dot"></span>Окончание</span>
            <span class="chip" style="color:var(--prefix)"><span class="dot"></span>Приставка</span>
            <span class="chip" style="color:var(--bpe)"><span class="dot"></span>BPE</span>
            <span class="chip" style="color:var(--punct)"><span class="dot"></span>Пунктуация</span>
            <span class="chip" style="color:var(--num)"><span class="dot"></span>Число</span>
          </div>
          <div class="token-stream" id="tokenFlow"></div>
        </div>
      </section>

      <div class="grid-2 section-gap">
        <section class="panel">
          <div class="panel-inner">
            <h2 class="section-title">Типы морфем</h2>
            <div class="chips" id="typeStats"></div>
          </div>
        </section>
        <section class="panel">
          <div class="panel-inner">
            <h2 class="section-title">Части речи</h2>
            <div class="chips" id="posStats"></div>
          </div>
        </section>
      </div>

      <section class="panel section-gap">
        <div class="panel-inner">
          <h2 class="section-title">Roundtrip decode <span class="rt-badge" id="rtBadge"></span></h2>
          <div class="roundtrip" id="decodedText"></div>
        </div>
      </section>
    </div>
  </div>

<script>
/* ── Morpheme Tokenizer UI ── */
/* All JS rewritten from scratch 2026-05-20 */

(function () {
  'use strict';

  // ── DOM refs ──
  var $input     = document.getElementById('input');
  var $btn       = document.getElementById('tokenizeBtn');
  var $clearBtn  = document.getElementById('clearBtn');
  var $dlBtn     = document.getElementById('downloadBtn');
  var $loading   = document.getElementById('loading');
  var $results   = document.getElementById('results');
  var $tokens    = document.getElementById('statTokens');
  var $words     = document.getElementById('statWords');
  var $latin     = document.getElementById('statLatin');
  var $roots     = document.getElementById('statRoots');
  var $vocab     = document.getElementById('statVocab');
  var $flow      = document.getElementById('tokenFlow');
  var $types     = document.getElementById('typeStats');
  var $pos       = document.getElementById('posStats');
  var $decoded   = document.getElementById('decodedText');
  var $badge     = document.getElementById('rtBadge');

  // Verify all elements exist
  var ids = ['input','tokenizeBtn','clearBtn','downloadBtn','loading',
             'results','statTokens','statWords','statLatin','statRoots',
             'statVocab','tokenFlow','typeStats','posStats','decodedText','rtBadge'];
  ids.forEach(function(id) {
    if (!document.getElementById(id)) {
      console.error('MISSING element: #' + id);
    }
  });

  var lastResult = null;
  var busy = false;

  // ── API call ──
  function doTokenize() {
    var text = $input.value.trim();
    if (!text || busy) return;

    busy = true;
    $btn.disabled = true;
    $loading.classList.add('active');

    fetch('/api/tokenize', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: text })
    })
    .then(function(resp) {
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      return resp.json();
    })
    .then(function(data) {
      console.log('API OK: ' + data.n_tokens + ' tokens');
      lastResult = { input: text, n_tokens: data.n_tokens, vocab_size: data.vocab_size,
                     roundtrip_match: data.roundtrip_match, decoded: data.decoded,
                     type_stats: data.type_stats, pos_stats: data.pos_stats,
                     tokens: data.tokens };
      showResults(data, text);
      $dlBtn.classList.add('visible');
    })
    .catch(function(err) {
      console.error('Tokenize error:', err);
      alert('Ошибка: ' + err.message);
    })
    .finally(function() {
      busy = false;
      $btn.disabled = false;
      $loading.classList.remove('active');
    });
  }

  // ── Render results ──
  function showResults(data, source) {
    $results.style.display = 'block';

    // Stats
    var wordList  = source.match(/[A-Za-zА-Яа-яЁё0-9_-]+/g) || [];
    var latinList = source.match(/[A-Za-z]+/g) || [];
    $tokens.textContent = String(data.n_tokens);
    $words.textContent  = String(wordList.length);
    $latin.textContent  = String(latinList.length);
    $roots.textContent  = String(data.type_stats['ROOT'] || 0);
    $vocab.textContent  = data.vocab_size.toLocaleString();

    // Token flow
    $flow.innerHTML = '';
    var i, t, el, isSpace, label;
    for (i = 0; i < data.tokens.length; i++) {
      t = data.tokens[i];
      el = document.createElement('span');
      isSpace = (t.text === 'B: ');

      el.className = 'token t-' + t.type + (isSpace ? ' t-space' : '');

      if (isSpace) {
        el.textContent = ' ';
      } else {
        // Strip prefix like "R:", "S:", "E:", "X:", "B:"
        label = (t.text.length > 2 && t.text[1] === ':') ? t.text.substring(2) : t.text;
        el.textContent = label;
        el.setAttribute('data-meta',
          t.text + ' · id=' + t.id + ' · ' + t.type +
          ' · POS=' + t.pos + ' · mpos=' + t.mpos + ' · wlen=' + t.wlen);
      }
      $flow.appendChild(el);
    }

    // Type stats chips
    $types.innerHTML = '';
    var typeMap = { SUF: 'suffix', END: 'ending', PRE: 'prefix' };
    Object.keys(data.type_stats).forEach(function(k) {
      var chip = document.createElement('span');
      var cssKey = typeMap[k] || k.toLowerCase();
      chip.className = 'stat-chip';
      chip.style.color = 'var(--' + cssKey + ')';
      chip.textContent = k + ': ' + data.type_stats[k];
      $types.appendChild(chip);
    });

    // POS stats chips
    $pos.innerHTML = '';
    Object.keys(data.pos_stats).forEach(function(k) {
      var chip = document.createElement('span');
      chip.className = 'stat-chip pos';
      chip.textContent = k + ': ' + data.pos_stats[k];
      $pos.appendChild(chip);
    });

    // Roundtrip
    $decoded.textContent = data.decoded;
    $badge.className = 'rt-badge ' + (data.roundtrip_match ? 'pass' : 'fail');
    $badge.textContent = data.roundtrip_match ? '✓ Match' : '✗ Differs';
  }

  // ── Clear ──
  function doClear() {
    $input.value = '';
    $input.focus();
    $results.style.display = 'none';
    $dlBtn.classList.remove('visible');
    $tokens.textContent = '0';
    $words.textContent  = '0';
    $latin.textContent  = '0';
    $roots.textContent  = '0';
    $vocab.textContent  = '0';
    $flow.innerHTML     = '';
    $types.innerHTML    = '';
    $pos.innerHTML      = '';
    $decoded.textContent = '';
    $badge.textContent  = '';
    $badge.className    = 'rt-badge';
    lastResult = null;
  }

  // ── Download JSON ──
  function doDownload() {
    if (!lastResult) return;
    var out = {
      '@context': { logos: 'https://logos.dev/ns/morpheme#' },
      input: lastResult.input,
      n_tokens: lastResult.n_tokens,
      vocab_size: lastResult.vocab_size,
      roundtrip_match: lastResult.roundtrip_match,
      decoded: lastResult.decoded,
      type_stats: lastResult.type_stats,
      pos_stats: lastResult.pos_stats,
      tokens: lastResult.tokens.map(function(t, i) {
        return { index: i, token: t.text, id: t.id, morpheme_type: t.type,
                 morpheme_position: t.mpos, pos: t.pos, word_length: t.wlen };
      })
    };
    var blob = new Blob([JSON.stringify(out, null, 2)], { type: 'application/json' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    var slug = lastResult.input.slice(0, 30).replace(/[^a-zA-Zа-яА-Я0-9]/g, '_').replace(/_+/g, '_');
    a.download = 'morpheme_' + slug + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  // ── Theme toggle ──
  (function initTheme() {
    var toggle = document.querySelector('[data-theme-toggle]');
    var root = document.documentElement;
    var theme = root.getAttribute('data-theme') || 'dark';
    var sunSVG = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
    var moonSVG = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';

    function setIcon() { toggle.innerHTML = (theme === 'dark') ? sunSVG : moonSVG; }
    setIcon();

    toggle.addEventListener('click', function() {
      theme = (theme === 'dark') ? 'light' : 'dark';
      root.setAttribute('data-theme', theme);
      setIcon();
    });
  })();

  // ── Bind events ──
  $btn.addEventListener('click', doTokenize);
  $clearBtn.addEventListener('click', doClear);
  $dlBtn.addEventListener('click', doDownload);
  $input.addEventListener('keydown', function(e) {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') doTokenize();
  });

  // ── Auto-run on load ──
  if ($input.value.trim()) {
    setTimeout(doTokenize, 200);
  }

  // Expose for console testing
  window.tokenize = doTokenize;

  console.log('Morpheme Tokenizer UI loaded. Elements: ' + ids.length + '/' + ids.length);
})();
</script>
